<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Sophie Bluel - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Work+Sans&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <header>
      <h1>Sophie Bluel <span>Architecte d'intérieur</span></h1>
      <nav>
        <ul>
          <li><a href="index.html#portfolio">projets</a></li>
          <li><a href="index.html#contact">contact</a></li>
          <li class="nav--active">login</li>
          <li><img src="./assets/icons/instagram.png" alt="Instagram" /></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="login">
        <h2 class="login__title">Log In</h2>
        <form action="#" method="post" class="login__form">
          <label for="email" class="login__label">E-mail</label>
          <input type="email" name="email" id="email" class="login__input" />

          <label for="password" class="login__label">Mot de passe</label>
          <input
            type="password"
            name="password"
            id="password"
            class="login__input"
          />

          <input type="submit" value="Se connecter" class="login__submit" />

          <a href="#" class="login__link">Mot de passe oublié</a>
        </form>
      </section>
    </main>

    <footer>
      <nav>
        <ul>
          <li>Mentions Légales</li>
        </ul>
      </nav>
    </footer>
    <script src="./assets/Javascripts/login.js" defer></script>
  </body>
</html>
